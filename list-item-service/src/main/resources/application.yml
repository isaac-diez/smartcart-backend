server:
  port: 8083

spring:
  application:
    name: list-item-service
  datasource:
    url: jdbc:postgresql://${SUPABASE_HOST}.supabase.com:6543/postgres?currentSchema=auth_svc&sslmode=require
    username: ${SUPABASE_USERNAME}
    password: ${SUPABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: listitem_svc
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: listitem_svc
    default-schema: listitem_svc
  profiles:
    active: local

jwt:
  secret: ${JWT_SECRET}

# URL interna hacia notification-service
services:
  notification:
    url: http://localhost:8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.smartcart: DEBUG
