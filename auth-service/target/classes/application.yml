server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${SUPABASE_HOST}.supabase.com:6543/postgres?currentSchema=auth_svc&sslmode=require
    username: ${SUPABASE_USERNAME}
    password: ${SUPABASE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: auth_svc
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: auth_svc
    default-schema: auth_svc
  profiles:
    active: local

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000       # 24h
  refresh-expiration-ms: 604800000  # 7d

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.smartcart: DEBUG
    org.springframework.security: INFO
