server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: user-group-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**, /api/groups/**
          filters:
            - StripPrefix=0

        - id: list-item-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/lists/**, /api/items/**
          filters:
            - StripPrefix=0

        - id: product-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=0

        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0
  profiles:
    active: local

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000       # 24h
  refresh-expiration-ms: 604800000  # 7d

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    com.smartcart: DEBUG
    org.springframework.cloud.gateway: TRACE
